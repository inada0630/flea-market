<!DOCTYPE html>
<html lang="jp" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ユーザー登録 - フリマデモ</title>
  <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
  <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
</head>
<body>
<div class="container">
  <div class="row justify-content-center mt-5">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header">
          <h3 class="card-title text-center">ユーザー登録</h3>
        </div>
        <div class="card-body">
          <form th:action="@{/register}" method="post" th:object="${userRegisterForm}">
            <div class="mb-3">
              <label class="form-label">ユーザー名</label>
              <input type="text" th:field="*{username}" class="form-control form-control-lg" placeholder="ユーザー名を入力">
            </div>
            <div class="mb-4">
              <label class="form-label">パスワード</label>
              <input type="password" th:field="*{password}" class="form-control form-control-lg" placeholder="パスワードを入力">
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-primary">登録</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
