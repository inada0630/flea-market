<!DOCTYPE html>
<html lang="jp" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/layout}">
<head>
  <meta charset="UTF-8">
  <title>商品一覧</title>
</head>
<body>
<section layout:fragment="content">
  <div>
    <a th:href="@{/shopping/creationForm}" class="btn btn-primary">出品</a>
  </div>
  <div class="card mt-3">
    <div class="card-header">検索</div>
    <div class="card-body mt-3">
    <form method="get" th:action="@{/shopping}" class="mb-3" th:object="${searchDTO}">
      <div class="form-group">
        <input type="text" name="name" class="form-control" placeholder="商品名検索" th:field="*{name}">
      </div>
      <div class="form-group row align-items-start mb-4">
        <div class="col-md-5 mt-3">
          <label class="form-label">価格（円）</label>
          <div class="d-flex align-items-center gap-2">
            <input type="number" th:field="*{minPrice}" class="form-control" placeholder="最低価格">
            <span>〜</span>
            <input type="number" th:field="*{maxPrice}" class="form-control" placeholder="最高価格">
          </div>
        </div>
      <div class="form-group  mt-3">
        <div>
        <label class="form-label">ステータス</label>
        </div>
        <div class="btn-group">
          <input class="btn-check" type="checkbox" id="statusOnSale" name="status" value="ON_SALE" th:checked="*{isChecked('ON_SALE')}">
          <label class="btn btn-outline-primary" for="statusOnSale">販売中</label>
          <input class="btn-check" type="checkbox" id="statusPreparing" name="status" value="PREPARING" th:checked="*{isChecked('PREPARING')}">
          <label class="btn btn-outline-primary" for="statusPreparing">準備中</label>
          <input class="btn-check" type="checkbox" id="statusSoldOut" name="status" value="SOLD_OUT"  th:checked="*{isChecked('SOLD_OUT')}">
          <label class="btn btn-outline-primary" for="statusSoldOut">売り切れ</label>
        </div>
      </div>
      <div class="mt-3">
        <button type="submit" class="btn btn-primary">検索</button>
      </div>
      </div>
    </form>
    </div>
  </div>
  <div>
    <table class="table">
      <thead>
      <tr>
        <th>ID</th>
        <th>値段</th>
        <th>出品者</th>
        <th>商品名</th>
        <th>概要</th>
        <th>状況</th>
        <th>画像</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="shopping : ${shoppingList}" th:object="${shopping}">
        <td th:text="*{id}"></td>
        <td th:text="*{price}"></td>
        <td th:text="*{username}"></td>
        <td><a th:href="@{/shopping/{id}(id=*{id})}" th:text="*{name}"></a></td>
        <td th:text="*{description}"></td>
        <td th:text="*{statusLabel()}"></td>
        <td>
          <img th:src="@{'/uploads/' + *{imagePath}}" width="30">
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</section>
</body>
</html>
