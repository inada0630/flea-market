<!DOCTYPE html>
<html lang="jp" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title layout:title-pattern="$CONTENT_TITLE - $LAYOUT_TITLE">フリマデモ</title>
  <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
  <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
</head>
<body>
<div class="container">
  <nav class="navbar navbar-expand-lg bg-light">
    <div class="container-fluid">
      <a class="navbar-brand">フリマデモ</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
        <div class="navbar-nav  w-100">
          <a class="nav-link active" aria-current="page" th:href="@{/}">Home</a>
          <a class="nav-link" th:href="@{/shopping}">商品</a>
          <a class="nav-link" th:href="@{/account}">アカウント</a>
          <form th:action="@{/logout}" method="post" class="ms-auto">
            <button type="submit" class="btn btn-link nav-link  text-danger">ログアウト</button>

          </form>
        </div>
      </div>
    </div>
  </nav>
  <section layout:fragment="content" class="mt-3"></section>
</div>
</body>
</html>
