<!DOCTYPE html>
<html lang="jp" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/layout}">
<head>
  <meta charset="UTF-8">
  <title>商品詳細</title>
</head>
<body>
<section layout:fragment="content">
  <div>
    <a th:href="@{/account/{id}/editForm(id=${id})}" class="btn btn-primary">編集</a>
    <a th:href="@{/account/listing}" class="btn btn-secondary">戻る</a>
  </div>
  <div th:object="${shopping}" class="mt-3">
    <p th:text="*{id}"></p>
    <p th:text="*{name}"></p>
    <p th:text="*{price}"></p>
    <p th:text="*{username}"></p>
    <p th:text="*{description}"></p>
    <p th:text="*{statusLabel()}"></p>
    <p>
      <img th:src="@{'/uploads/' + *{imagePath}}" width="30">
    </p>
  </div>

</section>
</body>
</html>
